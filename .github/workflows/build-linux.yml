name: Build Linux Executable

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0 python3-tk libsane-dev sane-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-linux.txt
          pip install pyinstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Build executable
        run: |
          pyinstaller --name "ScanStation" \
            --onedir \
            --add-data "config.json:." \
            --add-data "digit_model.pth:." \
            --add-data "Overpass-Regular.ttf:." \
            --add-data "Spectral-Bold.ttf:." \
            --add-data "Spectral-Medium.ttf:." \
            --add-data "scan.ico:." \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=cv2 \
            --hidden-import=numpy \
            --hidden-import=pyzbar \
            --hidden-import=pyzbar.pyzbar \
            --hidden-import=torch \
            --hidden-import=sane \
            --collect-all pyzbar \
            --collect-all sane \
            main.py

      - name: Create tarball
        run: |
          tar -czvf ScanStation-linux.tar.gz -C dist ScanStation

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanStation-linux
          path: ScanStation-linux.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ScanStation-linux.tar.gz
          generate_release_notes: true
