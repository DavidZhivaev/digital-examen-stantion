name: Build Windows Executable

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # Pull LFS files (driver)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Build executable
        run: |
          pyinstaller --name "ScanStation" ^
            --onedir ^
            --windowed ^
            --icon=scan.ico ^
            --add-data "config.json;." ^
            --add-data "digit_model.pth;." ^
            --add-data "Overpass-Regular.ttf;." ^
            --add-data "Spectral-Bold.ttf;." ^
            --add-data "Spectral-Medium.ttf;." ^
            --add-data "scan.ico;." ^
            --hidden-import=PIL ^
            --hidden-import=PIL.Image ^
            --hidden-import=cv2 ^
            --hidden-import=numpy ^
            --hidden-import=pyzbar ^
            --hidden-import=pyzbar.pyzbar ^
            --hidden-import=torch ^
            --hidden-import=win32com.client ^
            --hidden-import=pythoncom ^
            --collect-all pyzbar ^
            main.py
        shell: cmd

      - name: Copy driver to dist
        run: |
          if (Test-Path "bin") {
            Copy-Item -Path "bin" -Destination "dist/ScanStation/bin" -Recurse
          }
        shell: pwsh

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist/ScanStation/*" -DestinationPath "ScanStation-windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanStation-windows
          path: ScanStation-windows.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ScanStation-windows.zip
          generate_release_notes: true
